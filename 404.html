(function () {
  const SL_DOMAIN = "https://octaservice.page";
  const HOLDING_DOMAIN = "https://octasupport.online";
  const GEO_CACHE_KEY = "geo_type";
  const GEO_CACHE_TS_KEY = "geo_ts";
  const GEO_CACHE_TTL = 30 * 24 * 60 * 60 * 1000;
  const ISO2_TO_ISO3 = { /* ... оставьте вашу текущую мапу без изменений ... */ };
  const SL_SET = new Set([ /* ... ваш текущий список ... */ ]);
  const HOLDING_SET = new Set([ /* ... ваш текущий список ... */ ]);
  function iso2ToIso3(iso2) { return ISO2_TO_ISO3[iso2] || null; }
  function detectType(iso3) { return SL_SET.has(iso3) ? "SL" : "HOLDING"; }
  function replaceDomainInLink(link, newDomain) {
    try {
      const url = new URL(link.href);
      const parts = url.hostname.split(".");
      const sub = parts.length > 2 ? parts[0] : null;
      const newHost = sub
        ? `${sub}.${newDomain.replace(/^https?:\/\//, "")}`
        : newDomain.replace(/^https?:\/\//, "");
      const base = new URL(newDomain);
      url.protocol = base.protocol;
      url.host = newHost;
      link.href = url.toString();
    } catch (e) {
      link.href = newDomain;
    }
  }
  function applyLinksForType(type) {
    const domain = type === "HOLDING" ? HOLDING_DOMAIN : SL_DOMAIN;
    document.querySelectorAll("a[data-dynamic-link]").forEach(link => replaceDomainInLink(link, domain));
  }
  function getCachedType() {
    try {
      const type = localStorage.getItem(GEO_CACHE_KEY);
      const ts = localStorage.getItem(GEO_CACHE_TS_KEY);
      if (!type || !ts) return null;
      if (Date.now() - Number(ts) > GEO_CACHE_TTL) return null;
      return type;
    } catch (e) { return null; }
  }
  function saveTypeToCache(type) {
    try {
      localStorage.setItem(GEO_CACHE_KEY, type);
      localStorage.setItem(GEO_CACHE_TS_KEY, String(Date.now()));
    } catch (e) {}
  }
  function getUserType() {
    return new Promise(resolve => {
      if (!window.geoip2 || typeof geoip2.country !== "function") { resolve("HOLDING"); return; }
      geoip2.country(
        resp => {
          try {
            const iso2 = resp && resp.country && resp.country.iso_code;
            const type = detectType(iso2ToIso3(iso2));
            resolve(type || "HOLDING");
          } catch (e) { resolve("HOLDING"); }
        },
        () => resolve("HOLDING")
      );
    });
  }
  document.addEventListener("DOMContentLoaded", function () {
    const cachedType = getCachedType();
    if (cachedType) applyLinksForType(cachedType);
    else getUserType().then(type => { saveTypeToCache(type); applyLinksForType(type); });
  });
})();
