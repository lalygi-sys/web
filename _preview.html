<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webflow Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bar-h: 56px;
      --bg: rgba(10, 11, 14, 0.72);
      --panel: #101216;
      --panel-2: #14171d;
      --hover: rgba(255, 255, 255, 0.05);
      --accent: #5b7cfa;
      --accent-soft: rgba(91, 124, 250, 0.14);
      --text: #f3f4f7;
      --text-2: #a2a9b8;
      --text-3: #6c7382;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.7);
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .bar {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--bar-h);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      background: var(--bg);
      backdrop-filter: saturate(160%) blur(16px);
      -webkit-backdrop-filter: saturate(160%) blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      z-index: 30;
    }

    /* dropdown */
    .dd { position: relative; flex-shrink: 0; }
    .dd-trigger {
      display: inline-flex; align-items: center; gap: 10px;
      min-width: 250px; height: 38px; padding: 0 10px 0 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 13.5px; font-weight: 600;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .dd-trigger:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.05); }
    .dd.open .dd-trigger { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .dd-trigger .cur-tag {
      font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--text); white-space: nowrap;
    }
    .dd-trigger .cur-tag span { color: var(--text-3); font-weight: 500; }
    .dd-trigger .cur-title { flex: 1; text-align: left; white-space: nowrap; letter-spacing: -0.01em; }
    .dd-trigger .chev {
      width: 16px; height: 16px; flex-shrink: 0; color: var(--text-3);
      transition: transform .2s cubic-bezier(.4,0,.2,1);
    }
    .dd.open .dd-trigger .chev { transform: rotate(180deg); color: var(--text-2); }

    .dd-menu {
      position: absolute; top: calc(100% + 10px); left: 0;
      width: 340px; max-height: 74vh; overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 6px;
      opacity: 0; transform: translateY(-8px) scale(.985); transform-origin: top left;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s cubic-bezier(.16,1,.3,1);
    }
    .dd.open .dd-menu { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .dd-menu::-webkit-scrollbar { width: 10px; }
    .dd-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 6px; border: 3px solid var(--panel); }
    .dd-menu::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    .dd-group { padding: 4px 0; }
    .dd-group + .dd-group { border-top: 1px solid var(--border); }
    .dd-group-label {
      color: rgba(255, 255, 255, 0.28); font-size: 12px; font-weight: 600;
      letter-spacing: -0.01em;
      padding: 8px 12px 6px;
    }

    .dd-item {
      position: relative; display: flex; flex-direction: column; gap: 2px;
      width: 100%; padding: 8px 12px;
      border: 0; border-radius: 9px; background: transparent;
      color: var(--text-2); font-family: inherit;
      text-align: left; cursor: pointer;
      transition: background .13s ease, color .13s ease;
    }
    .dd-item:hover, .dd-item.kbd { background: var(--hover); color: var(--text); }
    .dd-item .title {
      font-size: 13.5px; font-weight: 500; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dd-item .summary {
      font-size: 11.5px; font-weight: 400; line-height: 1.35;
      color: var(--text-3);
    }
    .dd-item.active { color: var(--text); background: var(--accent-soft); }
    .dd-item.active .summary { color: #9fb0f8; }

    /* right-side actions */
    .spacer { flex: 1; }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 9px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer;
      transition: background .14s ease, color .14s ease, border-color .14s ease;
    }
    .icon-btn[hidden] { display: none; }
    .icon-btn:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
    .icon-btn svg { width: 17px; height: 17px; }
    .icon-btn.with-text {
      width: auto; gap: 8px; padding: 0 13px;
      font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
      text-decoration: none; white-space: nowrap;
    }
    .icon-btn.with-text svg { width: 15px; height: 15px; flex-shrink: 0; }

    .frame-wrap { position: absolute; inset: var(--bar-h) 0 0 0; background: #0b0d10; }
    iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  </style>
</head>
<body>
  <nav class="bar" id="bar">
    <div class="dd" id="dd">
      <button class="dd-trigger" id="ddTrigger" aria-haspopup="menu" aria-expanded="false">
        <span class="cur-tag" id="curTag">Webflow <span>Project</span></span>
        <span class="cur-title" id="curTitle">Выберите страницу</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dd-menu" id="ddMenu" role="menu"></div>
    </div>
    <div class="spacer"></div>
    <a class="icon-btn with-text" id="figmaLink" href="https://www.figma.com/design/1S4Mzx3eukoGHvP452UMok/Tatiana-Kapkaeva--lastest-?node-id=0-1&t=tih46diztPrOviMC-1" target="_blank" rel="noopener" title="Открыть макет в Figma">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M8.5 2h3.5v6.667H8.5a3.333 3.333 0 1 1 0-6.667z" fill="#F24E1E"/>
        <path d="M12 2h3.5a3.333 3.333 0 1 1 0 6.667H12V2z" fill="#FF7262"/>
        <path d="M12 8.667h3.5a3.333 3.333 0 1 1 0 6.666H12V8.667z" fill="#1ABCFE"/>
        <path d="M8.5 8.667H12v6.666H8.5a3.333 3.333 0 1 1 0-6.666z" fill="#A259FF"/>
        <path d="M8.5 15.333H12v3.334A3.333 3.333 0 1 1 8.5 15.333z" fill="#0ACF83"/>
      </svg>
      <span>Other portfolio</span>
    </a>
    <button class="icon-btn" id="openRaw" title="Открыть страницу в новой вкладке" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="icon-btn" id="reload" title="Перезагрузить страницу" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </nav>
  <div class="frame-wrap">
    <iframe id="viewer" title="preview"></iframe>
  </div>

  <script>
    const groups = [
      { label: "Анонс нового сайта", pages: [
        { file: "index.html", title: "Coming soon", summary: "Заглушка нового сайта с ребрендингом" },
      ]},
      { label: "Страницы сайта", pages: [
        { file: "old-home-2.html", title: "Main", summary: "Главная страница в старом дизайне" },
        { file: "introducing-broker-agreement.html", title: "IB Agreement · Doc", summary: "Договор с представляющим брокером" },
        { file: "ib-contest-nga-2025-t-c.html", title: "Contest NGA 2025 · Doc", summary: "Условия конкурса, Нигерия 2025" },
        { file: "ib-contest-t-c-indonesia.html", title: "Contest Indonesia · Doc", summary: "Условия конкурса, Индонезия" },
        { file: "ib-ny2025-contest-t-c.html", title: "Contest NY 2025 · Doc", summary: "Условия новогоднего конкурса 2025" },
      ]},
      { label: "Компоненты", pages: [
        { file: "ib-partners.html", title: "Components & Guides", summary: "Style guide и UI-компоненты" },
      ]},
      { label: "Служебные и драфты", pages: [
        { file: "untitled.html", title: "Untitled", summary: "Драфт вёрстки" },
        { file: "401.html", title: "401", summary: "Страница ошибки доступа" },
        { file: "404.html", title: "404", summary: "Страница «не найдено»" },
      ]},
    ];

    const allPages = groups.flatMap((g) => g.pages.map((p) => ({ ...p, group: g.label })));
    const dd = document.getElementById("dd");
    const ddTrigger = document.getElementById("ddTrigger");
    const ddMenu = document.getElementById("ddMenu");
    const viewer = document.getElementById("viewer");
    const curTitle = document.getElementById("curTitle");
    let items = [];
    let currentFile = null;
    let kbdIndex = -1;

    function setOpen(open) {
      dd.classList.toggle("open", open);
      ddTrigger.setAttribute("aria-expanded", String(open));
      if (open) {
        kbdIndex = items.findIndex((el) => el.dataset.file === currentFile);
        highlight();
        const active = items[kbdIndex];
        if (active) active.scrollIntoView({ block: "nearest" });
      } else {
        clearKbd();
      }
    }

    function clearKbd() { items.forEach((el) => el.classList.remove("kbd")); }
    function highlight() {
      items.forEach((el, i) => el.classList.toggle("kbd", i === kbdIndex));
      const el = items[kbdIndex];
      if (el) el.scrollIntoView({ block: "nearest" });
    }

    function activate(file) {
      const page = allPages.find((p) => p.file === file);
      if (!page) return;
      currentFile = file;
      viewer.src = file + "?t=" + Date.now();
      curTitle.textContent = page.title;
      items.forEach((el) => el.classList.toggle("active", el.dataset.file === file));
      if (location.hash.slice(1) !== file) history.replaceState(null, "", "#" + file);
    }

    groups.forEach((group) => {
      const g = document.createElement("div");
      g.className = "dd-group";
      const label = document.createElement("div");
      label.className = "dd-group-label";
      label.textContent = group.label;
      g.appendChild(label);
      group.pages.forEach((p) => {
        const item = document.createElement("button");
        item.className = "dd-item";
        item.dataset.file = p.file;
        item.setAttribute("role", "menuitem");
        item.innerHTML = '<span class="title">' + p.title + '</span><span class="summary">' + p.summary + '</span>';
        item.addEventListener("click", () => { activate(p.file); setOpen(false); });
        item.addEventListener("mousemove", () => {
          const i = items.indexOf(item);
          if (i !== kbdIndex) { kbdIndex = i; highlight(); }
        });
        g.appendChild(item);
        items.push(item);
      });
      ddMenu.appendChild(g);
    });

    ddTrigger.addEventListener("click", (e) => { e.stopPropagation(); setOpen(!dd.classList.contains("open")); });
    document.addEventListener("click", (e) => { if (!dd.contains(e.target)) setOpen(false); });

    document.addEventListener("keydown", (e) => {
      const isOpen = dd.classList.contains("open");
      if (e.key === "Escape") { setOpen(false); return; }
      if (!isOpen) return;
      if (e.key === "ArrowDown") { e.preventDefault(); kbdIndex = Math.min(items.length - 1, kbdIndex + 1); highlight(); }
      else if (e.key === "ArrowUp") { e.preventDefault(); kbdIndex = Math.max(0, kbdIndex - 1); highlight(); }
      else if (e.key === "Enter" && items[kbdIndex]) { e.preventDefault(); activate(items[kbdIndex].dataset.file); setOpen(false); }
    });

    document.getElementById("openRaw").addEventListener("click", () => {
      if (currentFile) window.open(currentFile, "_blank");
    });
    document.getElementById("reload").addEventListener("click", () => {
      if (currentFile) viewer.src = currentFile + "?t=" + Date.now();
    });

    const initial = location.hash.slice(1);
    const startFile = allPages.some((p) => p.file === initial) ? initial : allPages[0].file;
    activate(startFile);
  </script>
</body>
</html>
